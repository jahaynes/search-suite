<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Search Suite</title>
    <link rel="stylesheet" href="css/pico.min.css">
    <script type="module" src="index2.js" content="no-cache"></script>
</head>

<body>
    <div>
        <fieldset id="collections"></fieldset>
    </div>
    <hr />
    <div class='grid'>
        <div>
            <label for="search">Query:</label>
            <input id="search" type="text">
        </div>
        <div>
            <label for="max_results">Max Results:</label>
            <input id="max_results" type="number" min="1" max="100" />
        </div>
    </div>
    <hr />
    <div id="result_wrapper">
    </div>
</body>

</html>
